<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maze Runner — Spectator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #eee; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 24px; gap: 16px; }
    h1 { font-size: 18px; letter-spacing: 2px; color: #aaa; }
    #controls { display: flex; align-items: center; gap: 16px; }
    #start-btn { padding: 8px 24px; background: #2a2; color: #fff; border: none; font-family: monospace; font-size: 14px; cursor: pointer; border-radius: 3px; }
    #start-btn:disabled { background: #444; cursor: default; }
    #restart-btn { padding: 8px 24px; background: #a42; color: #fff; border: none; font-family: monospace; font-size: 14px; cursor: pointer; border-radius: 3px; }
    #status { font-size: 13px; color: #888; }
    .param-group { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .param-group label { color: #888; }
    .param-group input { width: 56px; background: #222; border: 1px solid #444; color: #eee; font-family: monospace; font-size: 13px; padding: 4px 6px; border-radius: 3px; }
    #layout { display: flex; gap: 24px; align-items: flex-start; }
    canvas { border: 2px solid #333; flex-shrink: 0; }
    #sidebar { width: 220px; display: flex; flex-direction: column; gap: 16px; }
    .panel { background: #1a1a1a; border: 1px solid #333; padding: 12px; }
    .panel h2 { font-size: 12px; color: #666; margin-bottom: 8px; letter-spacing: 1px; }
    .player-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 3px 0; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .rank-row { display: flex; gap: 8px; font-size: 13px; padding: 3px 0; }
    .rank-num { color: #ffd700; width: 20px; }
    .rank-time { color: #888; margin-left: auto; }
    .won-badge { color: #ffd700; font-size: 10px; margin-left: auto; }
  </style>
</head>
<body>
  <h1>MAZE RUNNER</h1>
  <div id="controls">
    <button id="start-btn" disabled>START GAME</button>
    <button id="restart-btn">RESTART</button>
    <div class="param-group"><label>rooms</label><input id="inp-rooms" type="number" min="5" max="50" value="15"></div>
    <div class="param-group"><label>tick ms</label><input id="inp-tick" type="number" min="50" max="2000" value="300"></div>
    <div class="param-group"><label><input id="anim-chk" type="checkbox" checked> animate</label></div>
    <div id="status">connecting…</div>
  </div>
  <div id="layout">
    <canvas id="c"></canvas>
    <div id="sidebar">
      <div class="panel">
        <h2>PLAYERS</h2>
        <div id="player-list"></div>
      </div>
      <div class="panel">
        <h2>RANKINGS</h2>
        <div id="rankings"></div>
      </div>
    </div>
  </div>

  <script>
    const CELL = 36;
    const STROKE = 2;
    let ANIM_MS = 200; // derived from server tick rate
    const WALL_UP = 1, WALL_DOWN = 2, WALL_RIGHT = 4, WALL_LEFT = 8, BIT_FLAG = 16;

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const inpRooms = document.getElementById('inp-rooms');
    const inpTick = document.getElementById('inp-tick');
    const playerList = document.getElementById('player-list');
    const rankingsEl = document.getElementById('rankings');

    let grid = null;
    let rooms = 0;
    let following = null;   // player id being followed (fog-only view), or null
    let animate = true;     // false = repaint on message only (no 60fps interpolation)

    // per-player animation state keyed by id
    // { from: {r,c}, to: {r,c}, startMs: number, won: bool }
    const playerAnims = {};

    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${wsProto}://${location.host}/spectate`);
    ws.onopen = () => status.textContent = 'connected — waiting for players…';
    ws.onclose = () => { status.textContent = 'disconnected'; startBtn.disabled = true; };
    ws.onerror = () => status.textContent = 'connection error';

    let roster = {};          // id -> {id,pos,won,moves} — full client-side state
    let gameStarted = false;
    const mazeCanvas = document.createElement('canvas');  // offscreen, static walls
    const mazeCtx = mazeCanvas.getContext('2d');
    let flagXY = null;

    ws.onmessage = e => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'win') {
        status.textContent = `${msg.player} won in ${msg.moves} moves!`;
        renderRankings(msg.rankings);
        return;
      }

      const now = performance.now();
      if (msg.type === 'state') {
        // full snapshot: grid (cache it) + full roster
        if (msg.tick_ms) {
          ANIM_MS = Math.floor(msg.tick_ms * 0.7);
          inpTick.value = msg.tick_ms;
          inpRooms.value = msg.rooms;
        }
        if (msg.rooms !== rooms) {
          rooms = msg.rooms;
          canvas.width = canvas.height = rooms * CELL;
        }
        grid = msg.grid;
        buildMazeCache();
        roster = {};
        msg.players.forEach(p => roster[p.id] = p);
        gameStarted = msg.started;
        syncAnims(msg.players, now, true);
        renderAll(msg.rankings);
      } else if (msg.type === 'positions') {
        // full roster, no grid (join/leave/start)
        roster = {};
        msg.players.forEach(p => roster[p.id] = p);
        gameStarted = msg.started;
        syncAnims(msg.players, now, true);
        renderAll(msg.rankings);
      } else if (msg.type === 'moved') {
        // delta: only players that moved this tick — merge, don't drop others
        msg.players.forEach(p => roster[p.id] = p);
        syncAnims(msg.players, now, false);
        renderAll(msg.rankings);
      }

      // animation off → no rAF loop running, so repaint now (event-driven)
      if (!animate) draw(now);
    };

    function syncAnims(players, now, removeMissing) {
      players.forEach(p => {
        const anim = playerAnims[p.id];
        if (!anim) {
          playerAnims[p.id] = { from: p.pos, to: p.pos, startMs: now - ANIM_MS, won: p.won };
        } else if (anim.to.r !== p.pos.r || anim.to.c !== p.pos.c) {
          const t = ease(Math.min(1, (now - anim.startMs) / ANIM_MS));
          const cur = { r: lerp(anim.from.r, anim.to.r, t), c: lerp(anim.from.c, anim.to.c, t) };
          playerAnims[p.id] = { from: cur, to: p.pos, startMs: now, won: p.won };
        } else {
          anim.won = p.won;
        }
      });
      if (removeMissing) {
        Object.keys(playerAnims).forEach(id => { if (!(id in roster)) delete playerAnims[id]; });
      }
    }

    function renderAll(rankings) {
      const n = Object.keys(roster).length;
      startBtn.disabled = gameStarted || ws.readyState !== WebSocket.OPEN;
      if (following) {
        status.textContent = `following ${following} — click again to exit`;
      } else {
        status.textContent = gameStarted
          ? `game running — ${n} player${n !== 1 ? 's' : ''}`
          : `lobby — ${n} player${n !== 1 ? 's' : ''} waiting`;
      }
      renderPlayerList(Object.values(roster));
      if (rankings) renderRankings(rankings);
    }

    // render the static maze walls to an offscreen canvas once (per grid change);
    // the frame loop just blits it instead of redrawing 1600 cells at 60fps
    function buildMazeCache() {
      mazeCanvas.width = mazeCanvas.height = rooms * CELL;
      mazeCtx.fillStyle = '#1a1a1a';
      mazeCtx.fillRect(0, 0, mazeCanvas.width, mazeCanvas.height);
      mazeCtx.strokeStyle = '#555';
      mazeCtx.lineWidth = STROKE;
      mazeCtx.lineCap = 'square';
      flagXY = null;
      for (let r = 0; r < rooms; r++) {
        for (let c = 0; c < rooms; c++) {
          const cell = grid[r * rooms + c];
          const x = c * CELL, y = r * CELL;
          if (cell & WALL_UP)    mline(x, y, x + CELL, y);
          if (cell & WALL_DOWN)  mline(x, y + CELL, x + CELL, y + CELL);
          if (cell & WALL_RIGHT) mline(x + CELL, y, x + CELL, y + CELL);
          if (cell & WALL_LEFT)  mline(x, y, x, y + CELL);
          if (cell & BIT_FLAG)   flagXY = [x + CELL / 2, y + CELL / 2];
        }
      }
    }
    function mline(x1, y1, x2, y2) {
      mazeCtx.beginPath(); mazeCtx.moveTo(x1, y1); mazeCtx.lineTo(x2, y2); mazeCtx.stroke();
    }

    const animChk = document.getElementById('anim-chk');
    animChk.addEventListener('change', () => {
      animate = animChk.checked;
      if (animate) requestAnimationFrame(loop); // resume smooth loop
      else draw(performance.now());             // paint once at current positions
    });

    startBtn.addEventListener('click', () => {
      ws.send(JSON.stringify({ cmd: 'start' }));
      startBtn.disabled = true;
    });

    restartBtn.addEventListener('click', () => {
      ws.send(JSON.stringify({
        cmd: 'restart',
        rooms: parseInt(inpRooms.value) || 15,
        tick: parseInt(inpTick.value) || 300,
      }));
    });

    // rAF loop runs only while animation is on; otherwise we repaint on message
    function loop(now) {
      if (!animate) return;
      draw(now);
      requestAnimationFrame(loop);
    }

    function draw(now) {
      if (!grid) return;
      if (following && !playerAnims[following]) following = null; // left/gone

      sizeCanvas(rooms * CELL);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (following && playerAnims[following]) {
        // spotlight: blur + dim the whole maze, then a sharp 5x5 window
        ctx.save();
        ctx.filter = 'blur(3px)';
        drawScene(now);
        ctx.restore();
        ctx.fillStyle = 'rgba(17,17,17,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cell = playerAnims[following].to;     // discrete cell = fog centre
        const ws = 5 * CELL;
        const wx = (cell.c - 2) * CELL, wy = (cell.r - 2) * CELL;

        ctx.save();
        ctx.beginPath();
        ctx.rect(wx, wy, ws, ws);
        ctx.clip();
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(wx, wy, ws, ws);  // clean bg inside the window
        drawScene(now);                // sharp inside the clip
        ctx.restore();

        // window outline in the player's colour
        ctx.strokeStyle = playerColor(following);
        ctx.lineWidth = 3;
        ctx.strokeRect(wx, wy, ws, ws);
      } else {
        // normal view: blit the cached maze, draw players + flag on top
        ctx.drawImage(mazeCanvas, 0, 0);
        drawPlayers(now);
        if (flagXY) drawFlag(flagXY[0], flagXY[1]);
      }
    }
    requestAnimationFrame(loop);

    // draw the full maze live (walls + players + flag). Used by follow mode,
    // which needs the maze re-rendered under the blur/clip each frame.
    function drawScene(now) {
      ctx.strokeStyle = '#555';
      ctx.lineWidth = STROKE;
      ctx.lineCap = 'square';
      for (let r = 0; r < rooms; r++) {
        for (let c = 0; c < rooms; c++) {
          const cell = grid[r * rooms + c];
          const x = c * CELL, y = r * CELL;
          if (cell & WALL_UP)    line(x, y, x + CELL, y);
          if (cell & WALL_DOWN)  line(x, y + CELL, x + CELL, y + CELL);
          if (cell & WALL_RIGHT) line(x + CELL, y, x + CELL, y + CELL);
          if (cell & WALL_LEFT)  line(x, y, x, y + CELL);
        }
      }
      drawPlayers(now);
      if (flagXY) drawFlag(flagXY[0], flagXY[1]);
    }

    function drawPlayers(now) {
      Object.entries(playerAnims).forEach(([id, anim]) => {
        const t = animate ? ease(Math.min(1, (now - anim.startMs) / ANIM_MS)) : 1;
        const r = lerp(anim.from.r, anim.to.r, t);
        const c = lerp(anim.from.c, anim.to.c, t);
        const x = c * CELL + CELL / 2;
        const y = r * CELL + CELL / 2;

        ctx.beginPath();
        ctx.arc(x, y, CELL * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = anim.won ? '#ffd700' : playerColor(id);
        ctx.fill();

        ctx.fillStyle = '#111';
        ctx.font = `bold ${Math.floor(CELL * 0.28)}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(id[0].toUpperCase(), x, y);
      });
    }

    // resize canvas only when the target size changes (avoids clearing churn)
    function sizeCanvas(px) {
      if (canvas.width !== px) canvas.width = canvas.height = px;
    }

    function lerp(a, b, t) { return a + (b - a) * t; }
    function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; } // ease in-out quad

    function renderPlayerList(players) {
      playerList.innerHTML = '';
      players = [...players].sort((a, b) => a.id.localeCompare(b.id));
      if (!players.length) {
        playerList.innerHTML = '<div style="color:#555;font-size:12px">none yet</div>';
        return;
      }
      players.forEach(p => {
        const row = document.createElement('div');
        row.className = 'player-row';
        row.style.cursor = 'pointer';
        if (p.id === following) row.style.background = '#2a2a1a';
        const eye = p.id === following ? '<span title="following" style="margin-left:4px">👁</span>' : '';
        row.innerHTML = `
          <div class="dot" style="background:${playerColor(p.id)}"></div>
          <span style="flex:1">${p.id}</span>
          <span style="color:#666;font-size:11px">${p.moves}m</span>
          ${p.won ? '<span class="won-badge">✓</span>' : ''}${eye}
        `;
        row.title = 'click to follow (fog-only view)';
        row.onclick = () => toggleFollow(p.id);
        playerList.appendChild(row);
      });
    }

    // follow a player (fog-only view); clicking the followed one again exits
    function toggleFollow(id) {
      following = (following === id) ? null : id;
      status.textContent = following ? `following ${following} — click again to exit` : '';
    }

    function renderRankings(rankings) {
      rankingsEl.innerHTML = '';
      if (!rankings || !rankings.length) {
        rankingsEl.innerHTML = '<div style="color:#555;font-size:12px">none yet</div>';
        return;
      }
      rankings.forEach(r => {
        const row = document.createElement('div');
        row.className = 'rank-row';
        row.innerHTML = `
          <span class="rank-num">#${r.rank}</span>
          <div class="dot" style="background:${playerColor(r.id)}"></div>
          <span>${r.id}</span>
          <span class="rank-time">${r.moves} moves</span>
        `;
        rankingsEl.appendChild(row);
      });
    }

    function playerColor(id) {
      let hash = 0;
      for (let i = 0; i < id.length; i++) hash = (hash * 31 + id.charCodeAt(i)) >>> 0;
      return `hsl(${hash % 360}, 80%, 65%)`;
    }

    function line(x1, y1, x2, y2) {
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }

    function drawFlag(x, y) {
      const h = CELL * 0.66;          // pole height
      const top = y - h / 2;          // top of pole
      const poleX = x - CELL * 0.16;  // pole sits left of centre

      ctx.save();
      // red glow so it stands out on the dark maze
      ctx.shadowColor = '#ff1f1f';
      ctx.shadowBlur = CELL * 0.5;

      // pole — light, with a dark edge for contrast
      ctx.beginPath();
      ctx.moveTo(poleX, top);
      ctx.lineTo(poleX, top + h);
      ctx.lineWidth = Math.max(2.5, CELL * 0.08);
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#fff';
      ctx.stroke();

      // triangular pennant, bright red
      const fw = CELL * 0.4, fh = CELL * 0.32;
      ctx.beginPath();
      ctx.moveTo(poleX, top);
      ctx.lineTo(poleX + fw, top + fh / 2);
      ctx.lineTo(poleX, top + fh);
      ctx.closePath();
      ctx.fillStyle = '#ff1f1f';
      ctx.fill();
      ctx.lineWidth = Math.max(1, CELL * 0.03);
      ctx.strokeStyle = '#fff';
      ctx.stroke();
      ctx.restore();
    }
  </script>
</body>
</html>
