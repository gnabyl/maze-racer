<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maze Runner — Spectator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; color: #eee; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 24px; gap: 16px; }
    h1 { font-size: 18px; letter-spacing: 2px; color: #aaa; }
    #controls { display: flex; align-items: center; gap: 16px; }
    #start-btn { padding: 8px 24px; background: #2a2; color: #fff; border: none; font-family: monospace; font-size: 14px; cursor: pointer; border-radius: 3px; }
    #start-btn:disabled { background: #444; cursor: default; }
    #restart-btn { padding: 8px 24px; background: #a42; color: #fff; border: none; font-family: monospace; font-size: 14px; cursor: pointer; border-radius: 3px; }
    #status { font-size: 13px; color: #888; }
    .param-group { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .param-group label { color: #888; }
    .param-group input { width: 56px; background: #222; border: 1px solid #444; color: #eee; font-family: monospace; font-size: 13px; padding: 4px 6px; border-radius: 3px; }
    #layout { display: flex; gap: 24px; align-items: flex-start; }
    canvas { border: 2px solid #333; flex-shrink: 0; }
    #sidebar { width: 220px; display: flex; flex-direction: column; gap: 16px; }
    .panel { background: #1a1a1a; border: 1px solid #333; padding: 12px; }
    .panel h2 { font-size: 12px; color: #666; margin-bottom: 8px; letter-spacing: 1px; }
    .player-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 3px 0; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .rank-row { display: flex; gap: 8px; font-size: 13px; padding: 3px 0; }
    .rank-num { color: #ffd700; width: 20px; }
    .rank-time { color: #888; margin-left: auto; }
    .won-badge { color: #ffd700; font-size: 10px; margin-left: auto; }
  </style>
</head>
<body>
  <h1>MAZE RUNNER</h1>
  <div id="controls">
    <button id="start-btn" disabled>START GAME</button>
    <button id="restart-btn">RESTART</button>
    <div class="param-group"><label>rooms</label><input id="inp-rooms" type="number" min="5" max="50" value="15"></div>
    <div class="param-group"><label>tick ms</label><input id="inp-tick" type="number" min="50" max="2000" value="300"></div>
    <div id="status">connecting…</div>
  </div>
  <div id="layout">
    <canvas id="c"></canvas>
    <div id="sidebar">
      <div class="panel">
        <h2>PLAYERS</h2>
        <div id="player-list"></div>
      </div>
      <div class="panel">
        <h2>RANKINGS</h2>
        <div id="rankings"></div>
      </div>
    </div>
  </div>

  <script>
    const CELL = 36;
    const STROKE = 2;
    let ANIM_MS = 200; // derived from server tick rate
    const WALL_UP = 1, WALL_DOWN = 2, WALL_RIGHT = 4, WALL_LEFT = 8, BIT_FLAG = 16;

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const inpRooms = document.getElementById('inp-rooms');
    const inpTick = document.getElementById('inp-tick');
    const playerList = document.getElementById('player-list');
    const rankingsEl = document.getElementById('rankings');

    let grid = null;
    let rooms = 0;

    // per-player animation state keyed by id
    // { from: {r,c}, to: {r,c}, startMs: number, won: bool }
    const playerAnims = {};

    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${wsProto}://${location.host}/spectate`);
    ws.onopen = () => status.textContent = 'connected — waiting for players…';
    ws.onclose = () => { status.textContent = 'disconnected'; startBtn.disabled = true; };
    ws.onerror = () => status.textContent = 'connection error';

    ws.onmessage = e => {
      const msg = JSON.parse(e.data);

      if (msg.type === 'win') {
        status.textContent = `${msg.player} won in ${msg.moves} moves!`;
        renderRankings(msg.rankings);
        return;
      }

      if (msg.type !== 'state') return;

      const started = msg.started;
      startBtn.disabled = started || ws.readyState !== WebSocket.OPEN;
      status.textContent = started
        ? `game running — ${msg.players.length} player${msg.players.length !== 1 ? 's' : ''}`
        : `lobby — ${msg.players.length} player${msg.players.length !== 1 ? 's' : ''} waiting`;

      // derive animation duration from tick rate
      if (msg.tick_ms) {
        ANIM_MS = Math.floor(msg.tick_ms * 0.7);
        inpTick.value = msg.tick_ms;
        inpRooms.value = msg.rooms;
      }

      // update grid (static, only changes on restart)
      if (msg.rooms !== rooms) {
        rooms = msg.rooms;
        canvas.width = canvas.height = rooms * CELL;
      }
      grid = msg.grid;

      // update animation targets per player
      const now = performance.now();
      const seen = new Set();
      msg.players.forEach(p => {
        seen.add(p.id);
        const anim = playerAnims[p.id];
        if (!anim) {
          playerAnims[p.id] = { from: p.pos, to: p.pos, startMs: now - ANIM_MS, won: p.won, connected: p.connected };
        } else if (anim.to.r !== p.pos.r || anim.to.c !== p.pos.c) {
          const t = ease(Math.min(1, (now - anim.startMs) / ANIM_MS));
          const cur = { r: lerp(anim.from.r, anim.to.r, t), c: lerp(anim.from.c, anim.to.c, t) };
          playerAnims[p.id] = { from: cur, to: p.pos, startMs: now, won: p.won, connected: p.connected };
        } else {
          anim.won = p.won;
          anim.connected = p.connected;
        }
      });
      // remove disconnected players
      Object.keys(playerAnims).forEach(id => { if (!seen.has(id)) delete playerAnims[id]; });

      renderPlayerList(msg.players);
      renderRankings(msg.rankings);
    };

    startBtn.addEventListener('click', () => {
      ws.send(JSON.stringify({ cmd: 'start' }));
      startBtn.disabled = true;
    });

    restartBtn.addEventListener('click', () => {
      ws.send(JSON.stringify({
        cmd: 'restart',
        rooms: parseInt(inpRooms.value) || 15,
        tick: parseInt(inpTick.value) || 300,
      }));
    });

    // animation loop
    function frame(now) {
      requestAnimationFrame(frame);
      if (!grid) return;

      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // draw static maze (defer the flag so it sits on top of players)
      let flagXY = null;
      for (let r = 0; r < rooms; r++) {
        for (let c = 0; c < rooms; c++) {
          const cell = grid[r * rooms + c];
          const x = c * CELL, y = r * CELL;
          ctx.strokeStyle = '#555';
          ctx.lineWidth = STROKE;
          ctx.lineCap = 'square';
          if (cell & WALL_UP)    line(x, y, x + CELL, y);
          if (cell & WALL_DOWN)  line(x, y + CELL, x + CELL, y + CELL);
          if (cell & WALL_RIGHT) line(x + CELL, y, x + CELL, y + CELL);
          if (cell & WALL_LEFT)  line(x, y, x, y + CELL);
          if (cell & BIT_FLAG)   flagXY = [x + CELL / 2, y + CELL / 2];
        }
      }

      // draw animated players
      Object.entries(playerAnims).forEach(([id, anim]) => {
        const t = ease(Math.min(1, (now - anim.startMs) / ANIM_MS));
        const r = lerp(anim.from.r, anim.to.r, t);
        const c = lerp(anim.from.c, anim.to.c, t);
        const x = c * CELL + CELL / 2;
        const y = r * CELL + CELL / 2;
        const color = playerColor(id);

        ctx.beginPath();
        ctx.arc(x, y, CELL * 0.28, 0, Math.PI * 2);
        ctx.fillStyle = anim.won ? '#ffd700' : color;
        ctx.globalAlpha = anim.connected ? 1 : 0.35;
        ctx.fill();
        ctx.globalAlpha = 1;

        ctx.fillStyle = '#111';
        ctx.font = `bold ${Math.floor(CELL * 0.28)}px monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(id[0].toUpperCase(), x, y);
      });

      // draw flag last, on top of everything
      if (flagXY) drawFlag(flagXY[0], flagXY[1]);
    }
    requestAnimationFrame(frame);

    function lerp(a, b, t) { return a + (b - a) * t; }
    function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; } // ease in-out quad

    function renderPlayerList(players) {
      playerList.innerHTML = '';
      players = [...players].sort((a, b) => a.id.localeCompare(b.id));
      if (!players.length) {
        playerList.innerHTML = '<div style="color:#555;font-size:12px">none yet</div>';
        return;
      }
      players.forEach(p => {
        const row = document.createElement('div');
        row.className = 'player-row';
        const connDot = p.connected ? '#4c4' : '#844';
        row.innerHTML = `
          <div class="dot" style="background:${playerColor(p.id)}"></div>
          <span style="flex:1">${p.id}</span>
          <span style="color:#666;font-size:11px">${p.moves}m</span>
          <div class="dot" style="background:${connDot}" title="${p.connected ? 'online' : 'offline'}"></div>
          ${p.won ? '<span class="won-badge">✓</span>' : ''}
        `;
        playerList.appendChild(row);
      });
    }

    function renderRankings(rankings) {
      rankingsEl.innerHTML = '';
      if (!rankings || !rankings.length) {
        rankingsEl.innerHTML = '<div style="color:#555;font-size:12px">none yet</div>';
        return;
      }
      rankings.forEach(r => {
        const row = document.createElement('div');
        row.className = 'rank-row';
        row.innerHTML = `
          <span class="rank-num">#${r.rank}</span>
          <div class="dot" style="background:${playerColor(r.id)}"></div>
          <span>${r.id}</span>
          <span class="rank-time">${r.moves} moves</span>
        `;
        rankingsEl.appendChild(row);
      });
    }

    function playerColor(id) {
      let hash = 0;
      for (let i = 0; i < id.length; i++) hash = (hash * 31 + id.charCodeAt(i)) >>> 0;
      return `hsl(${hash % 360}, 80%, 65%)`;
    }

    function line(x1, y1, x2, y2) {
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }

    function drawFlag(x, y) {
      const h = CELL * 0.66;          // pole height
      const top = y - h / 2;          // top of pole
      const poleX = x - CELL * 0.16;  // pole sits left of centre

      ctx.save();
      // red glow so it stands out on the dark maze
      ctx.shadowColor = '#ff1f1f';
      ctx.shadowBlur = CELL * 0.5;

      // pole — light, with a dark edge for contrast
      ctx.beginPath();
      ctx.moveTo(poleX, top);
      ctx.lineTo(poleX, top + h);
      ctx.lineWidth = Math.max(2.5, CELL * 0.08);
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#fff';
      ctx.stroke();

      // triangular pennant, bright red
      const fw = CELL * 0.4, fh = CELL * 0.32;
      ctx.beginPath();
      ctx.moveTo(poleX, top);
      ctx.lineTo(poleX + fw, top + fh / 2);
      ctx.lineTo(poleX, top + fh);
      ctx.closePath();
      ctx.fillStyle = '#ff1f1f';
      ctx.fill();
      ctx.lineWidth = Math.max(1, CELL * 0.03);
      ctx.strokeStyle = '#fff';
      ctx.stroke();
      ctx.restore();
    }
  </script>
</body>
</html>
